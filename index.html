<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow // Premium To-Do App</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </span>
                <h1>TaskFlow</h1>
            </div>
            <p class="subtitle">Organize your thoughts, elevate your productivity</p>
        </header>

        <!-- Progress Stats Card -->
        <div class="stats-card">
            <div class="stats-info">
                <div>
                    <span class="stats-label">Progress</span>
                    <h3 class="stats-counter" id="progress-text">0 of 0 tasks completed</h3>
                </div>
                <div class="stats-percentage" id="progress-percent">0%</div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Input Form -->
        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="What's your next focus?..." autocomplete="off">
                <button id="add-btn" class="primary-btn" aria-label="Add task">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>

        <!-- Filters and Bulk Actions -->
        <div class="controls-section">
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <button id="clear-btn" class="text-btn">
                <span>Clear Completed</span>
            </button>
        </div>

        <!-- Todo List -->
        <div class="list-section">
            <ul id="task-list" class="task-list"></ul>
            
            <!-- Empty State -->
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
                <h3>Your workspace is clear</h3>
                <p>Add a task to kickstart your day.</p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Task added successfully!</div>

    <script src="script.js"></script>
</body>
</html>
